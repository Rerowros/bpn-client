name: Feature request
description: Propose a new BadVpn feature or workflow improvement.
title: "[feature] "
labels: ["type:feature", "needs:triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version. Use the architecture proposal template instead for large rewrites.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Agent service
        - Mihomo/runtime
        - zapret/winws
        - Updates/release
        - Documentation
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: risks
    attributes:
      label: Risks or constraints
      description: Mention security, routing, privacy, installer, update, or compatibility concerns.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the existing roadmap docs for overlap.
          required: true
        - label: This is not a large architecture rewrite. If it is, I will use the architecture proposal template.
          required: true
        - label: I did not include secrets, private service data, or raw user logs.
          required: true
